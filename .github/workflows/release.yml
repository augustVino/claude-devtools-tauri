name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> ./target

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Update version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Updating version to $VERSION"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json

      - name: Prepare Tauri signing key
        shell: bash
        run: |
          if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is empty or missing"
            exit 1
          fi

          RAW="${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
          KEY_PATH="$RUNNER_TEMP/tauri_signing.key"

          # Case 1: original two-line text (first line starts with "untrusted comment:")
          if echo "$RAW" | head -n1 | grep -q '^untrusted comment:'; then
            printf '%s\n' "$RAW" > "$KEY_PATH"
            echo "Using raw two-line key format"
          # Case 2: wrapped in base64
          elif DECODED=$(printf '%s' "$RAW" | (base64 --decode 2>/dev/null || base64 -D 2>/dev/null)) \
            && echo "$DECODED" | head -n1 | grep -q '^untrusted comment:'; then
            printf '%s\n' "$DECODED" > "$KEY_PATH"
            echo "Decoded base64-wrapped key"
          # Case 3: single base64 line (pure key body)
          elif echo "$RAW" | grep -Eq '^[A-Za-z0-9+/=]+$'; then
            printf '%s\n%s\n' "untrusted comment: tauri signing key" "$(echo "$RAW" | tr -d '\r\n')" > "$KEY_PATH"
            echo "Using single-line base64 key, constructed two-line file"
          else
            echo "::error::TAURI_SIGNING_PRIVATE_KEY format not recognized"
            exit 1
          fi

          # Export as env var for tauri-action
          KEY_B64=$(base64 < "$KEY_PATH" | tr -d '\r\n')
          echo "TAURI_SIGNING_PRIVATE_KEY=$KEY_B64" >> "$GITHUB_ENV"

          if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" >> "$GITHUB_ENV"
          fi

          echo "Tauri signing key prepared"

      - name: Create release
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          # Generate changelog
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %h %s" "${PREV_TAG}..HEAD")
          else
            CHANGELOG=$(git log --pretty=format:"- %h %s" -n 20)
          fi

          RELEASE_ID=$(gh api "repos/${{ github.repository }}/releases" \
            -X POST \
            -f tag_name="$TAG" \
            -f name="claude-devtools ${TAG}" \
            -f body="$(cat <<BODY
          ## 📦 下载

          | 平台 | 文件 |
          |------|------|
          | macOS (Apple Silicon) | `.dmg` |

          > 安装后应用无法打开？
          \`\`\`bash
          xattr -cr /Applications/claude-devtools.app
          \`\`\`

          ## 📄 开源声明

          本项目衍生自 [claude-devtools](https://github.com/matt1398/claude-devtools)，原作者 matt1398 及贡献者，采用 MIT 协议。

          ---

          ## 📝 更新日志

          ${CHANGELOG}
          BODY
          )" --jq '.id')

          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
          echo "Release created: id=$RELEASE_ID"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ steps.create_release.outputs.release_id }}
          args: --target aarch64-apple-darwin

      - name: Upload updater JSON
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle/macos"

          # Get actual filename from the uploaded release assets
          # (tauri-action may rename files, so we query the release rather than using local filename)
          TAR_GZ_NAME=$(gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name' | grep '\.tar\.gz$' | grep -v '\.sig$' | head -1)

          if [ -z "$TAR_GZ_NAME" ]; then
            echo "Error: Could not find .tar.gz asset in release"
            exit 1
          fi

          echo "Found release asset: $TAR_GZ_NAME"

          # Download the signature file from release and extract the signature key
          # The .sig file uploaded by tauri-action is base64-encoded; decode it and extract
          # the second line which contains the actual minisign signature (RUST...)
          SIG_NAME="${TAR_GZ_NAME}.sig"
          gh release download "${GITHUB_REF_NAME}" -p "$SIG_NAME" -O /tmp/signature.b64
          SIG=$(base64 -d < /tmp/signature.b64 | sed -n '2p')

          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/${TAR_GZ_NAME}"

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIG}",
                "url": "${DOWNLOAD_URL}"
              }
            }
          }
          EOF

          gh release upload "${GITHUB_REF_NAME}" latest.json --clobber
          echo "latest.json uploaded successfully"
